<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGoals Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #0B0E14; font-family: 'Inter', sans-serif; color: #E2E8F0; }
        .glass-card { background: #161B22; border: 1px solid #30363D; border-radius: 1.5rem; }
        .neon-text { color: #A5B4FC; text-shadow: 0 0 10px rgba(165, 180, 252, 0.3); }
        .progress-bg { background: #21262D; border-radius: 999px; }
        .progress-fill { background: linear-gradient(90deg, #818CF8, #C084FC); border-radius: 999px; transition: width 0.5s ease; }
        .tab-active { border-bottom: 2px solid #818CF8; color: #818CF8; }
    </style>
</head>
<body>
    <div id="app-content" class="max-w-md mx-auto min-h-screen pb-20">
        <header class="p-6 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold neon-text">MyGoals</h1>
                <p class="text-slate-500 text-sm">Hey DrMina 👋</p>
            </div>
            <div class="flex gap-2">
                <div class="bg-[#1C1610] border border-[#B87333]/30 px-3 py-1 rounded-full flex items-center gap-2">
                    <span class="text-[#FF9F1C]">🔥</span> <span class="font-bold text-[#FF9F1C]">0</span>
                </div>
                <div class="bg-[#1C1610] border border-[#FFD700]/30 px-3 py-1 rounded-full flex items-center gap-2">
                    <span class="text-[#FFD700]">🪙</span> <span class="font-bold text-[#FFD700]" id="total-coins">20</span>
                </div>
            </div>
        </header>

        <div class="flex justify-around border-b border-slate-800 mb-6 text-slate-500 font-medium">
            <div class="pb-2 px-4 cursor-pointer">Tasks</div>
            <div class="pb-2 px-4 cursor-pointer tab-active">Goals</div>
            <div class="pb-2 px-4 cursor-pointer text-sm">Ranks</div>
            <div class="pb-2 px-4 cursor-pointer"><i class="fa-solid fa-user"></i></div>
        </div>

        <div class="px-6 mb-8">
            <div class="border-2 border-dashed border-indigo-500/40 rounded-2xl p-4 text-center text-indigo-400 font-bold cursor-pointer hover:bg-indigo-500/5 transition-all">
                + Create New Goal 🎯
            </div>
        </div>

        <div class="px-6 space-y-6" id="goals-container">
            <div class="glass-card p-5">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 class="text-xl font-bold text-white">Be a Doctor</h3>
                        <p class="text-xs text-slate-400 mt-1">1/5 steps · <span class="text-indigo-400">20%</span></p>
                    </div>
                    <div class="flex gap-2">
                        <button class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-indigo-400"><i class="fa-solid fa-share-nodes text-xs"></i></button>
                        <button class="w-8 h-8 rounded-lg bg-red-900/20 flex items-center justify-center text-red-500"><i class="fa-solid fa-xmark text-xs"></i></button>
                    </div>
                </div>

                <div class="progress-bg h-2 mb-6">
                    <div class="progress-fill h-full" style="width: 20%"></div>
                </div>

                <div class="space-y-3">
                    <div class="bg-green-900/10 border border-green-500/20 p-4 rounded-xl flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full bg-green-500 flex items-center justify-center text-[10px]"><i class="fa-solid fa-check"></i></div>
                            <span class="text-slate-400 line-through">Medical Study</span>
                        </div>
                        <span class="text-xs font-bold text-yellow-500">20% 🪙 +20</span>
                    </div>

                    <div class="bg-slate-800/40 border border-slate-700 p-4 rounded-xl flex justify-between items-center opacity-80">
                        <div class="flex items-center gap-3">
                            <div class="w-6 h-6 rounded-full border-2 border-slate-600"></div>
                            <span class="text-white">Clinical Practice</span>
                        </div>
                        <span class="text-xs text-slate-500">20%</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // (Yahan aapka Firebase wala script rahega taaki data save hota rahe)
        // Maine UI design poora change kar diya hai
    </script>
</body>
</html>
