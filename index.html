<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGoals Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #0B0E14; font-family: 'Inter', sans-serif; color: #E2E8F0; }
        .glass-card { background: #161B22; border: 1px solid #30363D; border-radius: 1.5rem; }
        .neon-text { color: #A5B4FC; text-shadow: 0 0 10px rgba(165, 180, 252, 0.2); }
        .input-box { background: #1C2128; border: 1px solid #30363D; border-radius: 1rem; color: white; width: 100%; padding: 1rem; outline: none; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="auth-section" class="max-w-md mx-auto pt-20 px-6">
        <div class="glass-card p-8 text-center shadow-2xl">
            <h1 class="text-3xl font-bold neon-text mb-6">MyGoals Login</h1>
            <input type="email" id="email" placeholder="Email" class="input-box mb-4">
            <input type="password" id="password" placeholder="Password" class="input-box mb-6">
            <button onclick="handleAuth('login')" class="w-full bg-indigo-600 p-4 rounded-xl font-bold mb-3 hover:bg-indigo-500">Login</button>
            <button onclick="handleAuth('signup')" class="w-full text-slate-400 text-sm">Don't have an account? Signup</button>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto pb-20">
        <header class="p-6 flex justify-between items-center">
            <div><h1 class="text-2xl font-bold text-white">Hey DrMina 👋</h1><p class="text-indigo-400 text-xs font-bold uppercase tracking-widest">Level: Beginner</p></div>
            <div class="flex gap-2"><div class="bg-slate-800 px-3 py-1 rounded-full text-yellow-500 font-bold">🪙 <span id="coin-val">0</span></div><button onclick="logout()" class="text-slate-500 ml-2"><i class="fa-solid fa-power-off"></i></button></div>
        </header>
        <div class="px-6 mb-6">
            <div class="flex gap-2">
                <input type="text" id="goal-input" placeholder="What's your next goal?" class="input-box">
                <button onclick="addGoal()" class="bg-indigo-600 px-6 rounded-xl"><i class="fa-solid fa-plus text-white"></i></button>
            </div>
        </div>
        <div class="px-6 space-y-4" id="goals-list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_USR2bWA4ssiPVh18AQW2lXjsHSHhY_Q",
            authDomain: "mygoals-6a5d5.firebaseapp.com",
            projectId: "mygoals-6a5d5",
            storageBucket: "mygoals-6a5d5.firebasestorage.app",
            messagingSenderId: "299320870741",
            appId: "1:299320870741:web:8fef084a06fb656a2691dc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleAuth = async (t) => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            if(!e || !p) return alert("Fill all fields");
            try { t === 'signup' ? await createUserWithEmailAndPassword(auth, e, p) : await signInWithEmailAndPassword(auth, e, p); }
            catch(err) { alert(err.message); }
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (u) => {
            if(u) { document.getElementById('auth-section').classList.add('hidden'); document.getElementById('app-section').classList.remove('hidden'); sync(u.uid); }
            else { document.getElementById('auth-section').classList.remove('hidden'); document.getElementById('app-section').classList.add('hidden'); }
        });

        window.addGoal = async () => {
            const i = document.getElementById('goal-input');
            if(!i.value) return;
            await addDoc(collection(db, "goals"), { text: i.value, done: false, uid: auth.currentUser.uid });
            i.value = '';
        };

        function sync(uid) {
            onSnapshot(query(collection(db, "goals"), where("uid", "==", uid)), (s) => {
                const l = document.getElementById('goals-list'); l.innerHTML = '';
                let c = 0;
                s.forEach(d => {
                    const g = d.data(); if(g.done) c += 20;
                    l.innerHTML += `<div class="glass-card p-4 flex justify-between items-center ${g.done ? 'opacity-40' : ''}">
                        <span class="${g.done ? 'line-through text-slate-500' : 'text-white'}">${g.text}</span>
                        <div class="flex gap-2">
                            <button onclick="toggle('${d.id}', ${g.done})" class="w-10 h-10 rounded-lg ${g.done ? 'bg-green-600' : 'bg-slate-700'} flex items-center justify-center"><i class="fa-solid fa-check"></i></button>
                            <button onclick="del('${d.id}')" class="w-10 h-10 rounded-lg bg-red-900/20 text-red-500 flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
                        </div></div>`;
                });
                document.getElementById('coin-val').innerText = c;
            });
        }
        window.toggle = async (id, s) => { if(!s) confetti({ particleCount: 100, spread: 70 }); await updateDoc(doc(db, "goals", id), { done: !s }); };
        window.del = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "goals", id)); };
    </script>
</body>
</html>
