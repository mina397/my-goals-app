<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGoals Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');
        body { font-family: 'DM Sans', sans-serif; background-color: #080B14; color: #F1F5F9; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #60A5FA, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="auth-section" class="max-w-md mx-auto pt-20 px-6">
        <div class="glass p-8 rounded-[2rem] shadow-2xl">
            <h1 class="text-4xl font-bold text-center mb-2 gradient-text">MyGoals</h1>
            <p class="text-center text-slate-400 text-sm mb-8">Login to track your goals 🚀</p>
            <input type="email" id="email" placeholder="Email" class="w-full p-4 mb-4 rounded-2xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Password" class="w-full p-4 mb-4 rounded-2xl bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="handleAuth('login')" class="w-full bg-blue-600 p-4 rounded-2xl font-bold mb-2">Login</button>
            <button onclick="handleAuth('signup')" class="w-full bg-slate-700 p-4 rounded-2xl font-bold text-sm">Create Account</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50">
            <div>
                <h2 class="text-xl font-bold gradient-text" id="user-title text-sm">Beginner</h2>
                <div class="flex gap-3 text-xs font-bold">
                    <span class="text-orange-400">🔥 <span id="streak-val">0</span></span>
                    <span class="text-yellow-400">🪙 <span id="coin-val">0</span></span>
                </div>
            </div>
            <button onclick="logout()" class="p-3 bg-slate-800 rounded-xl text-slate-400"><i class="fa-solid fa-power-off"></i></button>
        </nav>
        <main class="max-w-lg mx-auto p-6 space-y-6">
            <div class="flex gap-2">
                <input type="text" id="goal-input" placeholder="New goal..." class="flex-1 p-4 rounded-2xl bg-slate-900 border border-slate-800 outline-none">
                <button onclick="addGoal()" class="bg-blue-600 px-6 rounded-2xl">+</button>
            </div>
            <div id="goals-list" class="space-y-4"></div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD_USR2bWA4ssiPVh18AQW2lXjsHSHhY_Q",
            authDomain: "mygoals-6a5d5.firebaseapp.com",
            projectId: "mygoals-6a5d5",
            storageBucket: "mygoals-6a5d5.firebasestorage.app",
            messagingSenderId: "299320870741",
            appId: "1:299320870741:web:8fef084a06fb656a2691dc",
            measurementId: "G-6Z2HL7MZLZ"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleAuth = async (m) => {
            const e = document.getElementById('email').value, p = document.getElementById('password').value;
            try { m === 'signup' ? await createUserWithEmailAndPassword(auth, e, p) : await signInWithEmailAndPassword(auth, e, p); }
            catch(err) { alert(err.message); }
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('app-section').classList.remove('hidden');
                syncData(user.uid);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('app-section').classList.add('hidden');
            }
        });

        window.addGoal = async () => {
            const i = document.getElementById('goal-input');
            if(!i.value) return;
            await addDoc(collection(db, "goals"), { text: i.value, done: false, uid: auth.currentUser.uid });
            i.value = '';
        };

        function syncData(uid) {
            const q = query(collection(db, "goals"), where("uid", "==", uid));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('goals-list');
                list.innerHTML = '';
                let coins = 0;
                snap.forEach(d => {
                    const g = d.data();
                    if(g.done) coins += 10;
                    list.innerHTML += `
                        <div class="p-4 rounded-2xl flex justify-between items-center ${g.done ? 'bg-green-500/10 border-green-500/20' : 'bg-slate-900 border-slate-800'} border">
                            <span class="${g.done ? 'line-through text-slate-500' : ''}">${g.text}</span>
                            <button onclick="toggleGoal('${d.id}', ${g.done})" class="w-8 h-8 rounded-lg ${g.done ? 'bg-green-500' : 'bg-slate-700'}"><i class="fa-solid fa-check text-xs"></i></button>
                        </div>`;
                });
                document.getElementById('coin-val').innerText = coins;
            });
        }

        window.toggleGoal = async (id, s) => {
            if(!s) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            await updateDoc(doc(db, "goals", id), { done: !s });
        };
    </script>
</body>
  </html>
